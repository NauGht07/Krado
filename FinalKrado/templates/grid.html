<div class="grid">
    {%for i in range(0, 9)%}
    <div id="{{i}}" class="board">
        {%for j in range(0, 9)%}
        <button id="{{i}}{{j}}" onclick="clicked(this.id)" class="cell" id="{{j}}"></button>
        {%endfor%}
    </div>
    {%endfor%}
</div>

<html> 
    <body>
        <audio id="win" src="{{ url_for('static', filename='win.wav') }}" preload="auto"></audio>
    </body>
</html>

<script>
    var cross = '<svg width="50px" height="50px" viewBox="0 0 24 24" version="1.1" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><style type="text/css">.st0{opacity:0.2;fill:none;stroke:#000000;stroke-width:5.000000e-02;stroke-miterlimit:10;}</style><g id="grid_system"/><g id="_icons"><path fill="#46bdf0" d="M5.3,18.7C5.5,18.9,5.7,19,6,19s0.5-0.1,0.7-0.3l5.3-5.3l5.3,5.3c0.2,0.2,0.5,0.3,0.7,0.3s0.5-0.1,0.7-0.3   c0.4-0.4,0.4-1,0-1.4L13.4,12l5.3-5.3c0.4-0.4,0.4-1,0-1.4s-1-0.4-1.4,0L12,10.6L6.7,5.3c-0.4-0.4-1-0.4-1.4,0s-0.4,1,0,1.4   l5.3,5.3l-5.3,5.3C4.9,17.7,4.9,18.3,5.3,18.7z"/></g></svg>'
    var circle = '<svg width="50px" height="50px" viewBox="0 0 20 20" version="1.1" xmlns="http://www.w3.org/2000/svg"><g id="layer1"><path fill="#fc628d" d="M 10 2 A 8 8 0 0 0 2 10 A 8 8 0 0 0 10 18 A 8 8 0 0 0 18 10 A 8 8 0 0 0 10 2 z M 10 3 A 7 7 0 0 1 17 10 A 7 7 0 0 1 10 17 A 7 7 0 0 1 3 10 A 7 7 0 0 1 10 3 z "; fill-opacity:1;"/></g></svg>'
    var opt = [circle, cross]
    var xTurn = true

    document.body.classList.add('xTurn')

    // Sets board up for first move
    for (i = 0; i < 9; i++) {
        id = i.toString()+(4).toString()
        set_grid(id)
    }

    // Handles button clicks
    async function clicked(button_id) {
        const button = document.getElementById(button_id);
        if (button.innerHTML !== "") return;

        await fetch('/clicked', {
            method: "POST",
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                button_id: button_id,
                turn: xTurn ? 'x' : 'o'
            })
        })
        .then(res => res.json())
        .then(data => {

            if (data.status === "game won") {
                winSound.play();

                setTimeout(() => {
                    alert("GAME WON by " + data.winner);
                    window.location.href = '/';
                }, (winSound.duration || 2) * 1000);

                return;
            }

            if (data.status === "board won") {
                document.getElementById(data.gridId).classList.add(data.turn);
            }
        });

        set_grid(button_id);
        button.innerHTML = opt[+xTurn];
        document.body.classList.toggle('oTurn');
        document.body.classList.toggle('xTurn');
        xTurn = !xTurn;
}


    // Sets up the board for the next move
    function set_grid(button_id) {
        current_grid = document.getElementById(button_id[0])
        current_grid.classList.add("disabled")

        next_grid = document.getElementById(button_id[1])
        next_grid.classList.remove("disabled")
    }
</script>
