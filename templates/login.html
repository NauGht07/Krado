<html>
<link
            rel="stylesheet"
            type="text/css"
            href="{{ url_for('static',filename='style.css') }}"
        />
<body>
<div class="grid-background">
<img class="login-logo" src="../static/logo.png" />
<form action="/login" method="POST" class="login-form">

    <div class="input-container">
        <div class="p1">
            <input name="user1" type="text" placeholder="Username"></input>
            <input name="password1" type="password" placeholder = "Password"></input>
        </div>
        
        <div class="p2">
            <input name="user2" type="text" placeholder="Username"></input>
            <input name="password2" type="password" placeholder = "Password"></input>
        </div>
    </div>

    <input class="" type="submit" value="Login" />
</form>
<form action="/play_with_ai" method="POST" class="login-form">
    <input class="" type="submit" value="Play vs AI" />
</div>

</body>
</html>
